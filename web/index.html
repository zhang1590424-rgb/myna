<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>训练工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,350;14..32,400;14..32,450;14..32,500;14..32,560;14..32,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 6l4-3 4 3v5l-4 3-4-3V6z"/>
            </svg>
          </div>
          <span class="sidebar-brand">训练工作台</span>
        </div>

        <nav class="nav-group" id="nav">
          <button class="nav-item active" data-view="experiments">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="2.5" y="2.5" width="11" height="11" rx="2"/>
              <path d="M5.5 6h5M5.5 8.5h3.5"/>
            </svg>
            <span class="nav-label">实验</span>
            <span class="nav-badge" id="navBadgeExperiments"></span>
          </button>
          <button class="nav-item" data-view="models">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <circle cx="8" cy="8" r="5"/>
              <path d="M8 5.5v3l2 1.5"/>
            </svg>
            <span class="nav-label">模型</span>
            <span class="nav-badge" id="navBadgeModels"></span>
          </button>
          <button class="nav-item" data-view="datasets">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="3" y="3" width="10" height="10" rx="1.5"/>
              <path d="M3 6.5h10M6.5 3v10"/>
            </svg>
            <span class="nav-label">数据</span>
            <span class="nav-badge" id="navBadgeDatasets"></span>
          </button>
          <button class="nav-item" data-view="lab">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M8 3L3 6v4.5l5 3 5-3V6L8 3z"/>
              <path d="M8 9v3.5M3 6l5 3 5-3"/>
            </svg>
            <span class="nav-label">测评</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="queue-status" id="queuePill">
            <span class="queue-dot" id="queueDot"></span>
            <span id="queueText">队列空闲</span>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main" id="canvas">
        <!-- views render here -->
      </main>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="/static/app.js"></script>
  </body>
</html>
