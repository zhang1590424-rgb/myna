<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myna</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/myna-icon-32.png" />
    <link rel="apple-touch-icon" href="/static/assets/myna-icon-192.png" />
    <link rel="stylesheet" href="/static/styles.css?v=ux-cleanup-v1" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <img src="/static/assets/myna-mark.svg" alt="" />
          </div>
          <span class="sidebar-brand">Myna</span>
        </div>

        <nav class="nav-group" id="nav">
          <button class="nav-item active" data-view="home">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M3 6.5L8 3l5 3.5v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6z"/>
              <path d="M6.5 13.5v-4h3v4"/>
            </svg>
            <span class="nav-label">首页</span>
          </button>
          <button class="nav-item" data-view="experiments">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="2.5" y="2.5" width="11" height="11" rx="2"/>
              <path d="M5.5 6h5M5.5 8.5h3.5"/>
            </svg>
            <span class="nav-label">实验</span>
            <span class="nav-badge" id="navBadgeExperiments"></span>
          </button>
          <button class="nav-item" data-view="models">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <circle cx="8" cy="8" r="5"/>
              <path d="M8 5.5v3l2 1.5"/>
            </svg>
            <span class="nav-label">模型</span>
            <span class="nav-badge" id="navBadgeModels"></span>
          </button>
          <button class="nav-item" data-view="datasets">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="3" y="3" width="10" height="10" rx="1.5"/>
              <path d="M3 6.5h10M6.5 3v10"/>
            </svg>
            <span class="nav-label">数据</span>
            <span class="nav-badge" id="navBadgeDatasets"></span>
          </button>
          <button class="nav-item" data-view="lab">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M8 3L3 6v4.5l5 3 5-3V6L8 3z"/>
              <path d="M8 9v3.5M3 6l5 3 5-3"/>
            </svg>
            <span class="nav-label">测评</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="queue-status" id="queuePill">
            <span class="queue-dot" id="queueDot"></span>
            <span id="queueText">队列空闲</span>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main" id="canvas">
        <!-- views render here -->
      </main>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="/static/app.js?v=ux-cleanup-v1"></script>
  </body>
</html>
